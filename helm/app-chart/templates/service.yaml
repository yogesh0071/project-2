apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-app-svc
  labels:
    app: {{ .Release.Name }}-app
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-app
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      nodePort: {{ .Values.service.nodePort }}
      protocol: TCP
