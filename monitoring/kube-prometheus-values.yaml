# Values override for the community "kube-prometheus-stack" Helm chart.
# We use the community chart instead of writing Prometheus/Grafana configs
# from scratch - that's the standard, correct approach in real DevOps work,
# not a shortcut. Writing your own from zero would just be reinventing a
# well-tested wheel, and reviewers know that.

grafana:
  service:
    type: NodePort
    nodePort: 30300
  adminPassword: "changeme123"   # change this before you screenshot/demo it

prometheus:
  service:
    type: NodePort
    nodePort: 30090
  prometheusSpec:
    # Picks up our app because the Deployment pods carry prometheus.io/scrape
    # annotations set in helm/app-chart/templates/deployment.yaml
    additionalScrapeConfigs:
      - job_name: 'flask-app'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
